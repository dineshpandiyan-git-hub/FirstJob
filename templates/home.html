<!DOCTYPE html>
<html>
<head>
    <title>AI Job Portal</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background-color: #1f8ef1;
            color: white;
            text-align: center;
        }

        .top-right {
            position: absolute;
            top: 20px;
            right: 30px;
        }

        .top-right a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        .container {
            margin-top: 200px;
        }

        a.button {
            display: inline-block;
            margin: 20px;
            padding: 15px 35px;
            background: white;
            color: #2a5298;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            transition: 0.3s;
        }

        a.button:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>

<div class="top-right">
    <a href="/admin/">Admin</a>
</div>

<div class="container">
    <h1>AI Resume Analyzer & Job Match Platform</h1>
    <a class="button" href="/register/">Register</a>
    <a class="button" href="/login/">Login</a>
</div>

</body>
</html>
