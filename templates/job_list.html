{% extends 'base.html' %}

{% block content %}

<style>
.jobs-wrapper {
    max-width: 800px;
    margin: auto;
    padding: 60px 20px;
}

.jobs-wrapper h2 {
    text-align: center;
    margin-bottom: 30px;
    font-size: 28px;
    color: #111;
}

.search-box {
    width: 100%;
    padding: 14px 18px;
    border-radius: 14px;
    border: 2px solid #1f8ef1;
    margin-bottom: 40px;
    font-size: 15px;
    outline: none;
    transition: 0.3s ease;
}

.search-box:focus {
    box-shadow: 0 0 15px rgba(31,142,241,0.4);
}

.job-card {
    background: linear-gradient(145deg, #ffffff, #f2f8ff);
    padding: 30px;
    border-radius: 20px;
    margin-bottom: 30px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.1);
    transition: 0.4s ease;
    animation: fadeUp 0.6s ease;
    color: #222;
}

.job-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 25px 50px rgba(0,0,0,0.2);
}

.job-card h3 {
    margin-bottom: 12px;
    font-size: 22px;
    color: #111;
}

.job-card p {
    margin-bottom: 10px;
    font-size: 15px;
    color: #333;
}

.apply-btn {
    margin-top: 15px;
    padding: 12px 20px;
    border-radius: 14px;
    border: none;
    background: #1f8ef1;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s ease;
    box-shadow: 0 8px 0 #1565c0;
}

.apply-btn:hover {
    transform: translateY(-5px);
    box-shadow: 0 15px 30px rgba(0,0,0,0.3);
}

.apply-btn:active {
    transform: translateY(4px);
    box-shadow: 0 4px 0 #1565c0;
}

.empty-text {
    text-align: center;
    font-weight: 500;
    color: #333;
    margin-top: 40px;
}

@keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>

<div class="jobs-wrapper">
    <h2>Available Jobs</h2>

<div style="text-align:right; margin-bottom:20px;">
    <a href="/my-applications/" style="
        padding:10px 18px;
        background:#1f8ef1;
        color:white;
        border-radius:12px;
        text-decoration:none;
        font-weight:bold;
        box-shadow:0 6px 0 #1565c0;
        transition:0.3s ease;">
        My Applications
    </a>
</div>

    <input 
        type="text" 
        id="jobSearch" 
        class="search-box" 
        placeholder="Search by title, skills, description..."
        onkeyup="filterJobs()"
    >

    {% if jobs %}
        {% for job in jobs %}
        <div class="job-card">
            <h3 class="job-title">{{ job.title }}</h3>
            <p class="job-description">{{ job.description }}</p>
            <p class="job-skills"><strong>Skills:</strong> {{ job.required_skills }}</p>

            <a href="/apply/{{ job.id }}/">
                <button class="apply-btn">Apply</button>
            </a>
        </div>
        {% endfor %}
    {% else %}
        <p class="empty-text">No jobs posted yet</p>
    {% endif %}
</div>

<script>
function filterJobs() {
    let input = document.getElementById("jobSearch").value.toLowerCase();
    let cards = document.getElementsByClassName("job-card");

    for (let i = 0; i < cards.length; i++) {
        let title = cards[i].querySelector(".job-title").innerText.toLowerCase();
        let desc = cards[i].querySelector(".job-description").innerText.toLowerCase();
        let skills = cards[i].querySelector(".job-skills").innerText.toLowerCase();

        if (title.includes(input) || desc.includes(input) || skills.includes(input)) {
            cards[i].style.display = "block";
        } else {
            cards[i].style.display = "none";
        }
    }
}
</script>

{% endblock %}
