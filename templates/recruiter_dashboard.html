{% extends 'base.html' %}

{% block content %}

<style>
.dashboard-wrapper {
    padding: 50px 20px;
    max-width: 1100px;
    margin: auto;
}

.form-card {
    max-width: 550px;
    margin: auto;
    padding: 40px;
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(12px);
    box-shadow: 0 25px 50px rgba(0,0,0,0.2);
    animation: slideFade 0.7s ease;
}

.form-card h2 {
    text-align: center;
    margin-bottom: 30px;
    color: #111;
    font-size: 24px;
}

.form-card input,
.form-card textarea {
    width: 100%;
    padding: 14px;
    margin-bottom: 20px;
    border-radius: 14px;
    border: none;
    outline: none;
    font-size: 15px;
    transition: 0.3s ease;
    background: rgba(255,255,255,0.9);
    color: #111;
}

.form-card textarea {
    resize: none;
    height: 100px;
}

.form-card input:focus,
.form-card textarea:focus {
    transform: scale(1.03);
    box-shadow: 0 0 15px rgba(31,142,241,0.6);
}

.form-card button {
    width: 100%;
    padding: 15px;
    border-radius: 15px;
    border: none;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
    background: #1f8ef1;
    color: white;
    transition: 0.3s ease;
    box-shadow: 0 8px 0 #1565c0;
}

.form-card button:hover {
    transform: translateY(-6px);
    box-shadow: 0 18px 30px rgba(0,0,0,0.3);
}

.form-card button:active {
    transform: translateY(4px);
    box-shadow: 0 4px 0 #1565c0;
}

.jobs-section {
    margin-top: 70px;
}

.jobs-section h2 {
    margin-bottom: 30px;
    font-size: 24px;
    color: #111;
}

.job-card {
    background: linear-gradient(145deg, #ffffff, #f4f9ff);
    padding: 25px;
    border-radius: 18px;
    margin-bottom: 25px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.1);
    transition: 0.3s ease;
    color: #222;
}

.job-card:hover {
    transform: translateY(-6px);
}

.job-card h3 {
    margin-bottom: 10px;
    color: #111;
    font-size: 20px;
}

.job-card p {
    margin-bottom: 8px;
    color: #333;
    font-size: 14px;
}

.job-actions {
    margin-top: 12px;
    display: flex;
    gap: 10px;
}

.action-btn {
    display: inline-block;
    padding: 10px 18px;
    border-radius: 12px;
    text-decoration: none;
    background: #1f8ef1;
    color: white;
    font-weight: bold;
    transition: 0.3s ease;
}

.action-btn:hover {
    background: #1565c0;
    transform: scale(1.05);
}

.delete-btn {
    background: #e53935;
}

.delete-btn:hover {
    background: #c62828;
}

.jobs-section p {
    color: #333;
    font-weight: 500;
}

@keyframes slideFade {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>

<div class="dashboard-wrapper">

    <div class="form-card">
        <h2>Post Job</h2>

        <form method="POST">
            {% csrf_token %}
            <input type="text" name="title" placeholder="Job Title" required>
            <textarea name="description" placeholder="Job Description" required></textarea>
            <input type="text" name="skills" placeholder="Skills (comma separated)" required>
            <button type="submit">Post Job</button>
        </form>
    </div>

    <div class="jobs-section">
        <h2>Your Jobs</h2>

        {% for job in jobs %}
            <div class="job-card">
                <h3>{{ job.title }}</h3>
                <p>{{ job.description }}</p>
                <p><strong>Skills:</strong> {{ job.required_skills }}</p>

                <div class="job-actions">
                    <a href="/applicants/{{ job.id }}/" class="action-btn">
                        View Applicants
                    </a>

                    <a href="/delete-job/{{ job.id }}/"
                       class="action-btn delete-btn"
                       onclick="return confirm('Are you sure you want to delete this job?');">
                        Delete Job
                    </a>
                </div>
            </div>
        {% empty %}
            <p>No jobs posted yet.</p>
        {% endfor %}
    </div>

</div>

{% endblock %}
