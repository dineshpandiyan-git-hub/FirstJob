<!DOCTYPE html>
<html>
<head>
<title>AI Job Portal - Register</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#1f8ef1);
    overflow:hidden;
}

body::before, body::after{
    content:"";
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,0.1);
    animation: float 8s infinite ease-in-out;
}

body::before{
    width:300px;
    height:300px;
    top:-100px;
    left:-100px;
}

body::after{
    width:400px;
    height:400px;
    bottom:-150px;
    right:-150px;
    animation-delay:4s;
}

@keyframes float{
    0%{ transform:translateY(0px) rotate(0deg);}
    50%{ transform:translateY(30px) rotate(180deg);}
    100%{ transform:translateY(0px) rotate(360deg);}
}

.register-box{
    width:380px;
    padding:40px;
    border-radius:20px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    border:1px solid rgba(255,255,255,0.3);
    box-shadow: 0 25px 45px rgba(0,0,0,0.2);
    text-align:center;
    color:white;
    animation: slideIn 0.8s ease;
}

@keyframes slideIn{
    from{opacity:0; transform:translateY(40px);}
    to{opacity:1; transform:translateY(0);}
}

h2{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:12px 0;
    border:none;
    border-radius:8px;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:white;
    color:#0f4c81;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#e6f2ff;
    transform:scale(1.05);
}

.link{
    display:block;
    margin-top:15px;
    text-decoration:none;
    color:white;
    font-weight:bold;
}

.error-message{
    background: rgba(255, 0, 0, 0.2);
    padding:10px;
    border-radius:8px;
    margin-bottom:15px;
    font-size:14px;
    animation: fadeError 0.5s ease;
}

@keyframes fadeError{
    from{opacity:0;}
    to{opacity:1;}
}

</style>
</head>

<body>

<div class="register-box">
    <h2>Create Account</h2>

    {% if error %}
    <div class="error-message">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Username" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Register</button>
    </form>

    <a class="link" href="/">Already have an account? Login</a>
</div>

</body>
</html>
