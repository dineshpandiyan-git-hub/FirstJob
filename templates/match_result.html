{% extends 'base.html' %}
{% block content %}

<style>
.result-container {
    max-width: 600px;
    margin: 80px auto;
    padding: 40px;
    background: #ffffff;
    border-radius: 16px;
    text-align: center;
    box-shadow: 0 15px 40px rgba(0,0,0,0.08);
}

.result-container h2 {
    margin-bottom: 25px;
    color: #111;
}

.message-box {
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 25px;
    font-weight: 500;
}

.success {
    background: #e6f7ee;
    color: #1a7f4b;
}

.fail {
    background: #fdecea;
    color: #b42318;
}

.back-btn {
    display: inline-block;
    padding: 12px 24px;
    border-radius: 10px;
    background: #1f8ef1;
    color: white;
    text-decoration: none;
    font-weight: 600;
    transition: 0.2s ease;
}

.back-btn:hover {
    background: #0f6fd6;
}
</style>

<div class="result-container">
    <h2>Match Score: {{ score }}%</h2>

    {% if score > 70 %}
        <div class="message-box success">
            🎉 Eligible! Application submitted successfully.
        </div>
    {% else %}
        <div class="message-box fail">
            ❌ Sorry, not eligible.
        </div>
    {% endif %}

    <a href="/jobs/" class="back-btn">Go Back to Available Jobs</a>
</div>

{% endblock %}
